{% extends 'base.html' %} {% block head %} {{ super() }}
<style>
  .admin-layout {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .admin-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .admin-header .page-title {
    font-family: var(--font-head);
    font-size: 1.4rem;
    font-weight: 800;
  }
  .admin-header-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .admin-content {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .admin-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .admin-table-card {
    border-radius: var(--radius);
    overflow: hidden;
  }
  .admin-subnav {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .admin-subnav a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 18px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: inherit;
    text-decoration: none;
    transition: all 0.2s;
  }
  .admin-subnav a:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(99, 120, 255, 0.04);
  }
  .admin-subnav a.active {
    background: rgba(99, 120, 255, 0.08);
    border-color: var(--accent);
  }
</style>
{% endblock %} {% block content %}
<div class="admin-layout">
  <div class="admin-header">
    <div class="page-title">{% block page_title %}{% endblock %}</div>
    <div class="admin-header-actions">
      {% block topbar_actions %}{% endblock %}
    </div>
  </div>
  <div class="admin-content">{% block admin_content %}{% endblock %}</div>
</div>
{% endblock %}
